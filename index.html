<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>H.D.D.Y.D</title>
<style>

button{

padding:15px 30px;

margin:10px;

font-size:18px;

border-radius:10px;

cursor:pointer;

}

body{

background:#0a0a0a;

color:white;

text-align:center;

font-family:Arial;

}

button{

padding:15px 40px;

margin:10px;

font-size:20px;

background:#111;

color:white;

border:2px solid #a020f0;

border-radius:15px;

cursor:pointer;

}

#quizScreen{

background:#151515;

padding:30px;

border-radius:20px;

margin:20px;

}

h1{

font-size:50px;

letter-spacing:5px;

}

#quizScreen{

background:#151515;

padding:30px;

border-radius:20px;

margin:20px auto;

max-width:500px;

}

#question{

font-size:24px;

margin:25px 0;

}

#result{

font-size:30px;

font-weight:bold;

margin:20px;

}


.correct{

color:deepskyblue;

}


.wrong{

color:red;

}

#answers{

margin:30px;

}


#answers.result{

font-size:35px;

font-weight:bold;

}

.rank{

white-space:nowrap;

}

#startScreen button{

display:block;

margin:15px auto;

}

#settingScreen{

background:#151515;

padding:30px;

border-radius:20px;

margin:20px auto;

max-width:500px;

}

#settingMessage{

font-size:25px;

font-weight:bold;

margin:25px;

color:deepskyblue;

}

</style>
</head>

<body>

<div id="startScreen">

<h1>рЯО§ H.D.D.Y.D рЯО§</h1>
<h2>~ How Deep Do You Dig? ~</h2>

<button onclick="showMode()">START</button>

<button onclick="showSettings()">
вЪЩпЄП SETTINGS
</button>

</div>

<div id="modeScreen" style="display:none;">

<h2>MODE SELECT</h2>

<div class="modeBox"></div>

<button onclick="startJQuiz()">
J-HIPHOP MODE
</button>

<button onclick="startUSQuiz()">
US HIPHOP MODE
</button>

<button onclick="startRandomQuiz()">
RANDOM MODE
</button>

</div>

<div id="settingScreen" style="display:none;">

<h2>вЪЩпЄП SETTINGS</h2>

<h3>TIME LIMIT</h3>

<button onclick="setTime(10)">
10 SEC
</button>

<button onclick="setTime(5)">
5 SEC
</button>

<button onclick="setTime(3)">
3 SEC
</button>

<p id="settingMessage">
вП± TIME LIMIT : 5 SEC
</p>

<button onclick="backStart()">
жИїгВЛ
</button>

</div>

<div id="quizScreen" style="display:none;">

<h3 id="questionNumber"></h3>
<h3 id="timer"></h3>
<h2 id="question"></h2>

<div id="answers"></div>

<p id="result"></p>

<button id="nextBtn"
style="display:none;"
onclick="nextQuestion()">
жђ°гБЃеХПй°М
</button>

<button id="backBtn"
style="display:none;"
onclick="goHome()">
жИїгВЛ
</button>

</div>

<script src="jhiphop.js"></script>
<script src="ushiphop.js"></script>

<script>




let currentQuestion = 0;
let score = 0;
let timeLeft = 5;
let timeLimit = 5;
let timer;

let quiz = [];

function showMode(){

document.getElementById("startScreen").style.display =
"none";

document.getElementById("modeScreen").style.display =
"block";

}

function showSettings(){

document.getElementById("startScreen").style.display =
"none";

document.getElementById("settingScreen").style.display =
"block";

}

function setTime(seconds){

timeLimit = seconds;

document.getElementById("settingMessage").innerHTML =
"вП± TIME LIMIT : " + seconds + " SEC";

}

function backStart(){

document.getElementById("settingScreen").style.display =
"none";

document.getElementById("startScreen").style.display =
"block";

}

function startJQuiz(){

quiz = [...jQuiz];

startQuiz();

}

function startUSQuiz(){

quiz = [...usQuiz];

startQuiz();

}

function startRandomQuiz(){

quiz = [...jQuiz, ...usQuiz];

startQuiz();

}


function startQuiz(){

let quizData = [...quiz];

quizData.sort(() => Math.random() - 0.5);

quiz = quizData.slice(0,10);


document.getElementById("startScreen").style.display =
"none";

document.getElementById("modeScreen").style.display =
"none";

document.getElementById("quizScreen").style.display =
"block";

showQuestion();

}

function showQuestion(){

const q = quiz[currentQuestion];

startTimer();

document.getElementById("questionNumber").innerHTML =
"Question " + (currentQuestion + 1) + " / " + quiz.length;

document.getElementById("question").innerHTML =
q.question;

const answersDiv =
document.getElementById("answers");

answersDiv.innerHTML = "";

q.answers.forEach((answer,index)=>{

const btn =
document.createElement("button");


btn.className = "answerBtn";

btn.innerHTML = answer;

btn.onclick = function(){

checkAnswer(index);

};

answersDiv.appendChild(btn);

});

}

function checkAnswer(index){

clearInterval(timer);

const q = quiz[currentQuestion];

if(index === q.correct){

score++;

document.getElementById("result").innerHTML =
"рЯЩЖвАНвЩВпЄПCorrect!рЯЩЖвАНвЩАпЄП<br>Respect.";

document.getElementById("result").className =
"correct";

}else{

document.getElementById("result").innerHTML =
"рЯЩЕвАНвЩВпЄПWrong!рЯЩЕвАНвЩАпЄП<br>Go Dig!";

document.getElementById("result").className =
"wrong";

}

document.querySelectorAll(".answerBtn").forEach(function(btn){

btn.disabled = true;

});

document.getElementById("nextBtn").style.display =
"block";

}

function nextQuestion(){

currentQuestion++;

document.getElementById("timer").innerHTML = "";

document.getElementById("result").innerHTML = "";

document.getElementById("nextBtn").style.display =
"none";

document.getElementById("questionNumber").innerHTML = "";

if(currentQuestion < quiz.length){

showQuestion();

}else{

document.getElementById("question").innerHTML = "";

let rank = "";

if(score === 10){

rank = "рЯССрЯРРYou Are G.O.A.TрЯРРрЯСС";

}else if(score >= 8){

rank = "рЯО§RespectрЯО§";

}else if(score >= 6){

rank = "рЯЂµрЯПїKeep Diggin'рЯЂµрЯПї";

}else if(score >= 4){

rank = "рЯШПNot Bad.рЯШП";

}else if(score >= 2){

rank = "рЯШЂCome on,Man.рЯШЂ";

}else{

rank = "рЯ§¶вАНвЩВпЄПBro. what Happened?рЯ§¶вАНвЩАпЄП";

}

document.getElementById("answers").className =
"result";

document.getElementById("answers").innerHTML =
"RESULT";


setTimeout(function(){

document.getElementById("answers").innerHTML +=
"<br><br>SCORE";

},1000);


setTimeout(function(){

document.getElementById("answers").innerHTML +=
"<br><br>" + score + " / " + quiz.length;

},2000);


setTimeout(function(){

document.getElementById("answers").innerHTML +=
"<br><br><span class='rank'>" + rank + "</span>";

document.getElementById("backBtn").style.display =
"block";

},3000);

}

}

function startTimer(){

timeLeft = timeLimit;

document.getElementById("timer").innerHTML =
"вП± " + timeLeft + " sec";

timer = setInterval(function(){

timeLeft--;

document.getElementById("timer").innerHTML =
"вП≥ " + timeLeft + " sec"


if(timeLeft <= 0){

clearInterval(timer);

document.getElementById("result").innerHTML =
"рЯЩЕвАНвЩВпЄПTime Up!рЯЩЕвАНвЩАпЄП<br>Go Dig!";

document.querySelectorAll(".answerBtn").forEach(function(btn){

btn.disabled = true;

});

setTimeout(function(){

nextQuestion();

},1000);

}

},1000);

}

function goHome(){

clearInterval(timer);

document.getElementById("quizScreen").style.display =
"none";

document.getElementById("startScreen").style.display =
"block";

document.getElementById("backBtn").style.display =
"none";

currentQuestion = 0;

score = 0;

}

</script>

</body>
</html>
